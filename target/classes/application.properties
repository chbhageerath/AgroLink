server.port=${PORT:8000}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.jwt.secret=${JWT_SECRET:default_secret}
app.jwt.algorithm=${JWT_ALGORITHM:HS256}
app.jwt.expiration-days=7

app.cors.origins=https://agrolink-india.vercel.app

app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

app.anthropic.api-key=${ANTHROPIC_API_KEY:}

logging.level.com.agrolink=INFO
spring.jackson.property-naming-strategy=SNAKE_CASE
