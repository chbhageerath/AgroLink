spring.datasource.password=Chbgr12345@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ddl-auto=update: Hibernate auto-creates/updates tables to match your @Entity classes.
# Good for development. For production, consider "validate" + proper migrations (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.jwt.secret=${JWT_SECRET:default_secret}
app.jwt.algorithm=${JWT_ALGORITHM:HS256}
app.jwt.expiration-days=7

app.cors.origins=http://localhost:3000

app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

app.anthropic.api-key=${ANTHROPIC_API_KEY:}

logging.level.com.agrolink=INFO

spring.jackson.property-naming-strategy=SNAKE_CASE
